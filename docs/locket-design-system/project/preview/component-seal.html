<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Public Sans", system-ui, sans-serif; background: #FDFBF7; padding: 20px; display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
.item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.seal { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
.outer { width: 28px; height: 28px; border-radius: 50%; border: 2px solid; display: flex; align-items: center; justify-content: center; }
.inner { width: 10px; height: 10px; border-radius: 50%; opacity: 0.8; }
.label { font-size: 11px; font-weight: 600; color: #2D2D2D; }
.desc { font-size: 9px; color: #8E8E93; font-family: monospace; }

/* Syncing pulse animation */
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.5); } }
.syncing .inner { animation: pulse 1.6s ease-in-out infinite; opacity: 0.6; }
</style>
</head>
<body>
  <div class="item">
    <div class="seal">
      <div class="outer" style="border-color:#D4AF37;">
        <div class="inner" style="background:#D4AF37;"></div>
      </div>
    </div>
    <div class="label">Secure</div>
    <div class="desc">gold</div>
  </div>
  <div class="item">
    <div class="seal">
      <div class="outer" style="border-color:#10B981;">
        <div class="inner" style="background:#10B981;"></div>
      </div>
    </div>
    <div class="label">Anchored</div>
    <div class="desc">emerald</div>
  </div>
  <div class="item syncing">
    <div class="seal">
      <div class="outer" style="border-color:#3B82F6;">
        <div class="inner" style="background:#3B82F6;"></div>
      </div>
    </div>
    <div class="label">Syncing</div>
    <div class="desc">pulse anim</div>
  </div>
  <div class="item">
    <div class="seal">
      <div class="outer" style="border-color:#E6E2D8;">
        <div class="inner" style="background:#E6E2D8;"></div>
      </div>
    </div>
    <div class="label">Pending</div>
    <div class="desc">watermark</div>
  </div>
  <div class="item">
    <div class="seal">
      <div class="outer" style="border-color:#8B0000;">
        <div class="inner" style="background:#8B0000;"></div>
      </div>
    </div>
    <div class="label">Compromised</div>
    <div class="desc">alert</div>
  </div>

  <!-- In context -->
  <div style="background:#FFF;border-radius:12px;padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,0.05);display:flex;align-items:center;justify-content:space-between;gap:32px;flex:1;min-width:200px;">
    <span style="font-size:15px;color:#2D2D2D;">Cryptographic Integrity</span>
    <div class="outer" style="border-color:#D4AF37;">
      <div class="inner" style="background:#D4AF37;"></div>
    </div>
  </div>
</body>
</html>
