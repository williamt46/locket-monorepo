<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Public Sans", system-ui, sans-serif; background: #252628; padding: 20px; }
.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
.swatch { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.dot { width: 52px; height: 52px; border-radius: 50%; }
.name { font-size: 10px; font-weight: 600; color: #EBEBF5; text-align: center; }
.hex { font-size: 9px; font-family: monospace; color: #A0A0A5; }
</style>
</head>
<body>
<div class="grid">
  <div class="swatch"><div class="dot" style="background:#252628;border:1px solid rgba(255,255,255,0.1);"></div><div class="name">BG</div><div class="hex">#252628</div></div>
  <div class="swatch"><div class="dot" style="background:#323336;"></div><div class="name">Card</div><div class="hex">#323336</div></div>
  <div class="swatch"><div class="dot" style="background:#1C1C1E;"></div><div class="name">Inset</div><div class="hex">#1C1C1E</div></div>
  <div class="swatch"><div class="dot" style="background:#FFFFFF;"></div><div class="name">Text</div><div class="hex">#FFFFFF</div></div>
  <div class="swatch"><div class="dot" style="background:#EBEBF5;"></div><div class="name">Soft Fog</div><div class="hex">#EBEBF5</div></div>
  <div class="swatch"><div class="dot" style="background:#A0A0A5;"></div><div class="name">Muted Steel</div><div class="hex">#A0A0A5</div></div>
  <div class="swatch"><div class="dot" style="background:#006EC7;"></div><div class="name">Locket Blue</div><div class="hex">#006EC7</div></div>
  <div class="swatch"><div class="dot" style="background:rgba(0,110,199,0.2);border:1px solid rgba(255,255,255,0.05);"></div><div class="name">Blue Tint</div><div class="hex">20% opacity</div></div>
  <div class="swatch"><div class="dot" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);"></div><div class="name">White/5</div><div class="hex">border</div></div>
  <div class="swatch"><div class="dot" style="background:#D4AF37;"></div><div class="name">Gold Seal</div><div class="hex">#D4AF37</div></div>
</div>
</body>
</html>
