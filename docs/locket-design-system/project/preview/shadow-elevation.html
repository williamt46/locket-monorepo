<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Public Sans", system-ui, sans-serif; background: #FDFBF7; padding: 24px; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.card { background: #FFFFFF; border-radius: 16px; padding: 18px; }
.title { font-size: 12px; font-weight: 700; color: #2D2D2D; margin-bottom: 4px; }
.val { font-size: 9px; font-family: monospace; color: #8E8E93; line-height: 1.5; }
</style>
</head>
<body>
<div class="grid">
  <div class="card" style="box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05);">
    <div class="title">Whisper</div>
    <div class="val">0 4px 20px -2px<br>rgba(0,0,0,0.05)<br>Cards · Light mode</div>
  </div>
  <div class="card" style="box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
    <div class="title">Soft</div>
    <div class="val">0 2px 8px<br>rgba(0,0,0,0.05)<br>Rows · Inputs</div>
  </div>
  <div class="card" style="box-shadow: 0 4px 16px rgba(0,0,0,0.20);">
    <div class="title">Floated</div>
    <div class="val">0 4px 16px<br>rgba(0,0,0,0.20)<br>FAB · Toggle btn</div>
  </div>
</div>
</body>
</html>
