<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,1&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; font-size: 20px; }
body { font-family: "Public Sans", system-ui, sans-serif; background: #252628; padding: 20px; display: flex; flex-direction: column; gap: 12px; max-width: 380px; }
.card { background: #323336; border-radius: 16px; padding: 18px; box-shadow: 0 4px 20px -2px rgba(0,0,0,0.20); }
.card-title { font-size: 15px; font-weight: 700; color: #FFFFFF; margin-bottom: 4px; }
.card-sub { font-size: 12px; color: #A0A0A5; }
.section-header { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #006EC7; display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
.btn { background: #006EC7; color: #FFF; font-size: 15px; font-weight: 600; border: none; border-radius: 12px; padding: 13px 20px; width: 100%; font-family: "Public Sans", sans-serif; cursor: pointer; }
.input-dark { background: #1C1C1E; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 13px 16px; font-size: 15px; color: #EBEBF5; width: 100%; font-family: "Public Sans", sans-serif; }
.input-dark::placeholder { color: #A0A0A5; }
.chip-dark { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: 999px; background: rgba(209,73,91,0.20); color: #D1495B; font-size: 13px; font-weight: 500; }
.enc { display: flex; align-items: center; gap: 12px; background: #1C1C1E; border: 1px solid rgba(255,255,255,0.05); padding: 14px; border-radius: 12px; }
.lock { width: 40px; height: 40px; border-radius: 50%; background: #006EC7; display: flex; align-items: center; justify-content: center; color: white; flex-shrink: 0; }
</style>
</head>
<body>
  <div class="card">
    <div class="section-header"><span class="material-symbols-outlined" style="font-size:16px;">palette</span>Dark Mode</div>
    <div class="card-title">Elevated Slate Surface</div>
    <div class="card-sub">Luminance separation · no border needed</div>
  </div>
  <input class="input-dark" placeholder="Add a note…" />
  <button class="btn">Save</button>
  <div style="display:flex;gap:8px;">
    <span class="chip-dark"><span class="material-symbols-outlined" style="font-size:16px;">water_drop</span>Cramps</span>
    <span style="display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:999px;background:rgba(118,72,157,0.20);color:#76489D;font-size:13px;font-weight:500;"><span class="material-symbols-outlined" style="font-size:16px;">mode_night</span>Anxious</span>
  </div>
  <div class="enc">
    <div class="lock"><span class="material-symbols-outlined">lock</span></div>
    <div><div style="font-size:14px;font-weight:700;color:#FFFFFF;">Data Encrypted</div><div style="font-size:12px;color:#A0A0A5;margin-top:2px;">Your intimate data is safe.</div></div>
  </div>
</body>
</html>
