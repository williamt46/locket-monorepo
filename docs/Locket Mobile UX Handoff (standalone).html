  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));

    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<title>Locket — Prototype vs. Live App UX Handoff<\u002Ftitle>\n<style>doc-page:not(:defined){visibility:hidden}<\u002Fstyle>\n<style>\n  body { margin:0; font-family: \"Public Sans\", -apple-system, BlinkMacSystemFont, \"Helvetica Neue\", sans-serif; color:#1B1C1B; }\n  h1 { font-size: 28px; font-weight:700; letter-spacing:-0.01em; margin:0 0 4px; }\n  .kicker { font-size: 12px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:#006EC7; margin:0 0 10px; }\n  .subhead { font-size:14px; color:#717783; margin:0 0 32px; }\n  h2 { font-size:19px; font-weight:700; color:#1B1C1B; margin: 36px 0 4px; padding-bottom:8px; border-bottom: 1px solid #E6E2D8; }\n  h3 { font-size:14px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:#006EC7; margin: 20px 0 8px; }\n  p { font-size:14px; line-height:1.6; margin: 6px 0; }\n  table { width:100%; border-collapse: collapse; margin: 10px 0 4px; font-size:13px; }\n  th { text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:#717783; font-weight:700; padding:6px 10px; border-bottom:1.5px solid #1B1C1B; }\n  td { padding:8px 10px; border-bottom:1px solid #E6E2D8; vertical-align:top; line-height:1.5; }\n  td.proto { color:#4A4A4A; }\n  td.live { color:#1B1C1B; }\n  .tag { display:inline-block; font-size:10px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; padding:2px 8px; border-radius:999px; margin-right:6px; }\n  .tag-visual { background:#E5F1FA; color:#006EC7; }\n  .tag-behavior { background:#EDE7F2; color:#76489D; }\n  .tag-content { background:#FFF2E0; color:#E08C00; }\n  .tag-gap { background:#F8E5E7; color:#D1495B; }\n  ul { margin:6px 0; padding-left:20px; font-size:14px; line-height:1.6; }\n  li { margin-bottom:4px; }\n  .callout { background:#F2F2F7; border-radius:12px; padding:14px 16px; font-size:13.5px; line-height:1.6; color:#4A4A4A; margin:10px 0; }\n  .callout b { color:#1B1C1B; }\n  code { background:#F2F2F7; padding:1px 6px; border-radius:4px; font-size:12.5px; font-family: ui-monospace, \"SF Mono\", Menlo, monospace; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<doc-page size=\"letter\" margin=\"0.85in\">\n\n<div class=\"kicker\">Locket — UX Handoff<\u002Fdiv>\n<h1>Prototype vs. Live App: UI/UX Differences<\u002Fh1>\n<p class=\"subhead\">Comparing <code>ui_kits/mobile_app<\u002Fcode> (the Locket design-system prototype) against <code>mobile/<\u002Fcode> (the live Expo/React Native codebase). Fable&nbsp;5 format — read screen-by-screen, top to bottom.<\u002Fp>\n\n<div class=\"callout\"><b>Headline finding:<\u002Fb> the live app is functionally far ahead of the prototype (real crypto, sync, backup/restore, symptom taxonomy, span-editing logic) but has not yet adopted the visual system the prototype defines. Nearly every screen still renders in a plain default-RN style — system emoji instead of Material Symbols, hairline borders instead of soft shadows, ad-hoc spacing instead of the token scale. Treat this doc as the build list for closing that gap.<p><\u002Fp>\n\n<h2>1 · Auth / Lock Screen<\u002Fh2>\n<table>\n<tbody><tr><th style=\"width:15%\"><\u002Fth><th style=\"width:42.5%\">Prototype<\u002Fth><th style=\"width:42.5%\">Live App<\u002Fth><\u002Ftr>\n<tr><td><span class=\"tag tag-visual\">Visual<\u002Fspan><\u002Ftd>\n  <td class=\"proto\">Full Locket wordmark/logo SVG (gold clasp + orbit rings), 140px, with a soft drop-shadow glow. \"Locket\" wordmark below in 32px/700.<\u002Ftd>\n  <td class=\"live\">Logo is a flat 150px gold circle at 30% opacity — an explicit placeholder (<code>{/* TODO: Replace with Static SVG Locket */}<\u002Fcode>). No glow, no mark.<\u002Ftd><\u002Ftr>\n<tr><td><span class=\"tag tag-content\">Content<\u002Fspan><\u002Ftd>\n  <td class=\"proto\">\"Tap anywhere to unlock\" + a small \"Secured locally\" line anchored above an animated Integrity Seal.<\u002Ftd>\n  <td class=\"live\">Same tap-to-unlock copy, but no Integrity Seal or \"Secured locally\" reassurance on this screen at all.<\u002Ftd><\u002Ftr>\n<tr><td><span class=\"tag tag-gap\">Gap<\u002Fspan><\u002Ftd>\n  <td class=\"proto\">—<\u002Ftd>\n  <td class=\"live\">A dev-only \"⚠ Clear Config (Dev)\" red button is permanently visible at the bottom of the screen — needs to be stripped before this can be compared as a finished screen.<\u002Ftd><\u002Ftr>\n<\u002Ftbody><\u002Ftable>\n\n<h2>2 · Calendar / Ledger<\u002Fh2>\n<table>\n<tbody><tr><th style=\"width:15%\"><\u002Fth><th style=\"width:42.5%\">Prototype<\u002Fth><th style=\"width:42.5%\">Live App<\u002Fth><\u002Ftr>\n<tr><td><span class=\"tag tag-behavior\">Interaction<\u002Fspan><\u002Ftd>\n  <td class=\"proto\">One continuous <b>vertical scroll<\u002Fb> showing prev/current/next month stacked, auto-scrolled to today. A floating \"Today\" pill jumps back.<\u002Ftd>\n  <td class=\"live\">A <b>horizontally paginated<\u002Fb>, swipe-per-month calendar (FlatList paging) for the whole year, plus a separate \"Yearly View\" reachable via a floating pill toggle at the bottom that flips the entire screen into a <code>VerticalYearView<\u002Fcode>. Two distinct navigation models where the prototype has one.<\u002Ftd><\u002Ftr>\n<tr><td><span class=\"tag tag-visual\">Visual<\u002Fspan><\u002Ftd>\n  <td class=\"proto\">Calendar sits inside a white <code>Card<\u002Fcode> (16px radius, whisper shadow) with a frosted floating nav pill (Calendar / Insights / Settings) top-right.<\u002Ftd>\n  <td class=\"live\">Calendar has no card container — flat page background. Top bar is plain text: \"Locket\" title, \"Insights →\" text link, and a raw ⚙️ emoji for Settings (no icon system, no nav pill, no frosted blur).<\u002Ftd><\u002Ftr>\n<tr><td><span class=\"tag tag-content\">Content<\u002Fspan><\u002Ftd>\n  <td class=\"proto\">Period days render as solid menstrual-red circles; predicted future days get a light watermark fill; today gets a blue outline ring.<\u002Ftd>\n  <td class=\"live\">Equivalent day-state logic exists (period / future / today) inside <code>MonthGrid<\u002Fcode>, but styling is driven by different theme tokens (<code>inkBlue<\u002Fcode>/<code>graphite<\u002Fcode>/<code>watermark<\u002Fcode>) than the prototype's phase palette — visually close, not token-identical.<\u002Ftd><\u002Ftr>\n<tr><td><span class=\"tag tag-gap\">Gap<\u002Fspan><\u002Ftd>\n  <td class=\"proto\">—<\u002Ftd>\n  <td class=\"live\">Real product complexity the prototype doesn't model at all: decrypting events client-side, merging multi-event days, an \"undecryptable entries\" recovery prompt, and first-run data seeding from onboarding.<\u002Ftd><\u002Ftr>\n<\u002Ftbody><\u002Ftable>\n\n<h2>3 · Log / Data Entry<\u002Fh2>\n<table>\n<tbody><tr><th style=\"width:15%\"><\u002Fth><th style=\"width:42.5%\">Prototype<\u002Fth><th style=\"width:42.5%\">Live App<\u002Fth><\u002Ftr>\n<tr><td><span class=\"tag tag-behavior\">Interaction<\u002Fspan><\u002Ftd>\n  <td class=\"proto\">Single screen. Symptoms/Mood/Sex/Triggers live inside four <b>accordion pills<\u002Fb> that expand in place to reveal chip pickers, each with its own confirm checkmark.<\u002Ftd>\n  <td class=\"live\">Two-step flow: bleeding intensity + period start/end live on <code>LogScreen<\u002Fcode>; everything else (\"Symptoms\") is an <b>\"Edit →\" link that pushes a separate <code>AddSymptomsScreen<\u002Fcode><\u002Fb> with the full taxonomy. No accordions or in-place expansion.<\u002Ftd><\u002Ftr>\n<tr><td><span class=\"tag tag-content\">Content<\u002Fspan><\u002Ftd>\n  <td class=\"proto\">Categories: Symptoms, Mood, Sex, Triggers — broad chip labels (\"bleeding\", \"cramps\", \"acne\"…).<\u002Ftd>\n  <td class=\"live\">Bleeding is its own dedicated first-class section (Spotting/Light/Medium/Heavy + clots), separate from the symptom library — a real clinical distinction the prototype collapses into one \"bleeding\" chip.<\u002Ftd><\u002Ftr>\n<tr><td><span class=\"tag tag-gap\">Gap<\u002Fspan><\u002Ftd>\n  <td class=\"proto\">—<\u002Ftd>\n  <td class=\"live\"><b>Period-start confirmation handshake:<\u002Fb> selecting Light/Medium/Heavy bleeding on a day not already flagged as a period triggers a modal asking the user to confirm a period start, because auto-marking would corrupt cycle predictions. This safeguard, plus span-clearing when a boundary is re-marked, doesn't exist in the prototype's simpler Start/End toggle buttons.<\u002Ftd><\u002Ftr>\n<tr><td><span class=\"tag tag-visual\">Visual<\u002Fspan><\u002Ftd>\n  <td class=\"proto\">Full-bleed tinted background (<code>logBg<\u002Fcode>), Start/End rendered as two large luteal-purple pill buttons with arrow glyphs.<\u002Ftd>\n  <td class=\"live\">Plain white background, Start/End are neutral outlined buttons that only take on the phase color once active — closer to the token system's \"outline → filled on select\" pattern than the prototype's always-colored buttons.<\u002Ftd><\u002Ftr>\n<\u002Ftbody><\u002Ftable>\n\n<h2>4 · Insights<\u002Fh2>\n<table>\n<tbody><tr><th style=\"width:15%\"><\u002Fth><th style=\"width:42.5%\">Prototype<\u002Fth><th style=\"width:42.5%\">Live App<\u002Fth><\u002Ftr>\n<tr><td><span class=\"tag tag-visual\">Visual<\u002Fspan><\u002Ftd>\n  <td class=\"proto\">Rich screen: underline <code>TabBar<\u002Fcode> (Insights / Cycle Trends), a large 244px conic-gradient <b>Orbit Gauge<\u002Fb> showing phase + cycle day, a 4-color phase legend, a horizontal day strip, and — on the Trends tab — Avg Cycle / Avg Period stat cards plus a segmented history bar per past cycle.<\u002Ftd>\n  <td class=\"live\">One flat screen: a single <code>PhaseInsightCard<\u002Fcode> (tinted box, icon + phase name + educational snippet + \"Read more →\" opening a content sheet) and, below it, a plain list of the last 3 years' average cycle length. No gauge, no tabs, no trends chart, no day strip.<\u002Ftd><\u002Ftr>\n<tr><td><span class=\"tag tag-content\">Content<\u002Fspan><\u002Ftd>\n  <td class=\"proto\">Static hand-written phase copy (\"Rising estrogen brings clarity and stamina…\").<\u002Ftd>\n  <td class=\"live\">Phase copy is pulled dynamically from a content service (<code>useEukiContent<\u002Fcode> / Euki education library) with a \"Read more\" bottom sheet — a more sophisticated content system than the prototype models, just not skinned to the visual language yet.<\u002Ftd><\u002Ftr>\n<tr><td><span class=\"tag tag-gap\">Gap<\u002Fspan><\u002Ftd>\n  <td class=\"proto\">Full Cycle Trends tab (avg stats, per-cycle phase bars).<\u002Ftd>\n  <td class=\"live\">Not built. This is the single biggest missing surface relative to the prototype — worth flagging as a scoped feature gap, not just a style gap.<\u002Ftd><\u002Ftr>\n<\u002Ftbody><\u002Ftable>\n\n<h2>5 · Settings<\u002Fh2>\n<table>\n<tbody><tr><th style=\"width:15%\"><\u002Fth><th style=\"width:42.5%\">Prototype<\u002Fth><th style=\"width:42.5%\">Live App<\u002Fth><\u002Ftr>\n<tr><td><span class=\"tag tag-visual\">Visual<\u002Fspan><\u002Ftd>\n  <td class=\"proto\">Sections styled as soft white cards (12px radius, whisper shadow, no borders), ALL-CAPS blue section headers per the token spec, chevron (›) affordance in <code>th.fog<\u002Fcode>.<\u002Ftd>\n  <td class=\"live\">Sections are hard-bordered gray boxes with a light-gray label bar header (<code>#F9FAFB<\u002Fcode> bg, 1px <code>#E5E7EB<\u002Fcode> borders) — a generic default-list look, not the card system. Row disclosure uses a literal <code>\"&gt;\"<\u002Fcode> character.<\u002Ftd><\u002Ftr>\n<tr><td><span class=\"tag tag-content\">Content<\u002Fspan><\u002Ftd>\n  <td class=\"proto\">Includes an \"Appearance\" section (Light/Dark/Device theme switch) and a persistent bottom <code>EncryptionBadge<\u002Fcode> reassurance.<\u002Ftd>\n  <td class=\"live\">No theme switcher (dark mode is token-defined but not wired to a control anywhere), no bottom encryption reassurance module.<\u002Ftd><\u002Ftr>\n<tr><td><span class=\"tag tag-behavior\">Behavior<\u002Fspan><\u002Ftd>\n  <td class=\"proto\">Export/Restore/Reset are visual-only stubs.<\u002Ftd>\n  <td class=\"live\"><b>Fully implemented:<\u002Fb> password-gated encrypted export/restore (v1 legacy + v2 cross-device flows), native share sheet, document picker, and a real two-step Factory Reset confirmation. Materially more capable than the prototype suggests.<\u002Ftd><\u002Ftr>\n<\u002Ftbody><\u002Ftable>\n\n<h2>Cross-cutting systemic gaps<\u002Fh2>\n\n<h3>Iconography<\u002Fh3>\n<p>The design system specs a two-tier Material Symbols system (Outlined for UI, Rounded for phase/semantic icons). The live app uses none of it: back buttons are literal <code>\"&lt;\"<\u002Fcode> / <code>\"←\"<\u002Fcode> characters, close is <code>\"✕\"<\u002Fcode>, settings is the system ⚙️ emoji, disclosure is <code>\"&gt;\"<\u002Fcode>. Every icon in the shipped app is a glyph or emoji, not a Material Symbol.<\u002Fp>\n\n<h3>Color tokens<\u002Fh3>\n<p>The two theme files have drifted independently. Notably: <code>colors.ts<\u002Fcode> renames the phase palette (<code>warmTerracotta<\u002Fcode>, <code>arcticTeal<\u002Fcode>, <code>orangePeel<\u002Fcode>, <code>deepReflectiveViolet<\u002Fcode>) versus the prototype/README's <code>menstrual/follicular/ovulatory/luteal<\u002Fcode> — same hex values, different vocabulary, which will confuse anyone cross-referencing the two. <code>colors.ts<\u002Fcode> also defines <code>alert: '#8B0000'<\u002Fcode> where the README/prototype specify <code>#C0392B<\u002Fcode>.<\u002Fp>\n\n<h3>Typography<\u002Fh3>\n<p>The live app has no Public Sans / SF Pro loaded — <code>typography.ts<\u002Fcode> falls back to platform system fonts (Avenir Next / Helvetica Neue) with a code comment admitting the mapping is a placeholder (\"<i>Using system Serif/Sans until custom fonts are loaded<\u002Fi>\").<\u002Fp>\n\n<h3>Cards, shadows, corner radii<\u002Fh3>\n<p>The prototype's whisper-shadow white cards (16px radius, 24px padding) appear only inconsistently in the live app — Settings and Insights lean on hard 1px borders instead, which reads as a different, more utilitarian product.<\u002Fp>\n\n<div class=\"callout\"><b>Suggested sequencing:<\u002Fb> (1) swap emoji/glyphs for Material Symbols everywhere, (2) reconcile the two color-token files into one source of truth, (3) load Public Sans and apply the card/shadow/radius system to Settings + Insights, (4) once visually aligned, scope the Cycle Trends tab as a net-new feature build.<p><\u002Fp>\n\n\n\n<script src=\"139c0cdb-68da-48b6-9699-2c92b302e472\"><\u002Fscript>\n\n\n<\u002Fdiv><\u002Fdiv><\u002Fdoc-page><\u002Fbody><\u002Fhtml>"
  </script>
